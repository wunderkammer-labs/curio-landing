<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>curio. | Discover museums, science &amp; nature spaces</title>
  <meta name="description" content="Discover and share moments of curiosity and connection at museums, science and nature spaces, and cultural heritage places.">
  <link rel="canonical" href="https://www.hellocurio.us/">
  <meta property="og:title" content="curio. | Discover museums, science &amp; nature spaces">
  <meta property="og:description" content="Discover and share moments of curiosity and connection at museums, science and nature spaces, and cultural heritage places.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.hellocurio.us/">
  <meta property="og:image" content="https://www.hellocurio.us/img/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="curio. Reflections, not reviews.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="curio. | Discover museums, science &amp; nature spaces">
  <meta name="twitter:description" content="Discover and share moments of curiosity and connection at museums, science and nature spaces, and cultural heritage places.">
  <meta name="twitter:image" content="https://www.hellocurio.us/img/og-image.png">
  <meta name="twitter:image:alt" content="curio. Reflections, not reviews.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;450;500;550;600;700;725;800;900&amp;display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: "Outfit", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e7e4dc url("img/bm_greatcourt.jpg") center / cover no-repeat;
    }

    .landing {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      isolation: isolate;
      padding: calc(4.5vw + 0.5in) 5.5vw 4.5vw;
    }

    .wordmark-lockup {
      --wordmark-size: clamp(3.11rem, 9.85vw, 12.44rem);
      display: inline-block;
      font-size: var(--wordmark-size);
      line-height: 1;
      transform: translateX(-0.045em);
    }

    .wordmark-image {
      display: block;
      width: auto;
      height: 1em;
    }

    .rule {
      display: block;
      width: 4.5rem;
      height: 3px;
      margin: 1.5rem 0 0;
      background: #47B0A1;
    }

    .copy {
      margin-top: 2.25rem;
    }

    .reflections {
      margin-bottom: 0.85rem;
      color: rgba(8,51,56,0.88);
      font-size: clamp(0.74rem, 1.4vw, 1.08rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .tagline {
      max-width: 52ch;
      color: rgba(8,51,56,0.82);
      font-size: clamp(0.78rem, 1.2vw, 0.95rem);
      font-weight: 600;
      line-height: 1.65;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .made-with {
      margin-top: 2rem;
      color: rgba(8,51,56,0.52);
      font-size: 0.82rem;
      font-weight: 550;
      letter-spacing: 0.05em;
    }

    @media (max-width: 640px) {
      body {
        background-position: 42% center;
      }

      .landing {
        padding: 3.5rem 1.25rem 2rem;
      }

      .landing::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(
            180deg,
            rgba(231, 228, 220, 0.97) 0%,
            rgba(231, 228, 220, 0.92) 42%,
            rgba(231, 228, 220, 0.58) 64%,
            rgba(231, 228, 220, 0.08) 100%
          );
        pointer-events: none;
      }

      .tagline {
        max-width: 30ch;
        color: rgba(8,51,56,0.92);
      }

      .made-with {
        color: rgba(8,51,56,0.68);
      }
    }
  </style>
</head>
<body>
  <main class="landing" aria-label="curio landing page">
    <div>
      <div class="wordmark-lockup">
        <img class="wordmark-image" src="assets/curio-wordmark-dark.svg" alt="curio">
      </div>
      <span class="rule" aria-hidden="true"></span>
    </div>
    <div class="copy">
      <div class="reflections">Reflections, not reviews.</div>
      <div class="tagline">Discover and share moments of curiosity and connection at museums, science &amp; nature spaces, and cultural heritage places.</div>
      <div class="made-with">Made with ♥ for museum nerds by museum nerds.</div>
    </div>
  </main>
</body>
</html>
